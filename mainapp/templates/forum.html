<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Community Forum</title>
<style>body{font-family:Arial;background:#0f172a;color:#e2e8f0;margin:0;padding:16px}.card{background:#1e293b;padding:14px;border-radius:10px;margin-bottom:12px}.top a{color:#60a5fa;margin-right:12px}input,textarea{width:100%;padding:8px;margin:6px 0;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#e2e8f0}button{padding:8px 12px;border:none;border-radius:8px;background:#2563eb;color:white;cursor:pointer}.meta{color:#94a3b8;font-size:12px}</style>
</head><body>
<div class="top"><a href="/">Videos</a><a href="/notes/">Notes</a><a href="/logout/">Logout</a></div>
<h2>Community Video Links</h2>
<div class="card">
<form method="post" action="/forum/add/">{% csrf_token %}
<input name="title" placeholder="Post title" required>
<input name="url" placeholder="Video link URL" required>
<textarea name="description" placeholder="Why this is useful"></textarea>
<button type="submit">Post Link</button>
</form></div>
{% for post in posts %}
<div class="card">
  <a href="{{ post.url }}" target="_blank" style="color:#93c5fd;font-weight:bold">{{ post.title }}</a>
  <div class="meta">posted by {{ post.user.username }} • {{ post.created_at|timesince }} ago</div>
  {% if post.description %}<p>{{ post.description }}</p>{% endif %}
  <form method="post" action="/forum/upvote/{{ post.id }}/">{% csrf_token %}
    <button type="submit">⬆ Upvote ({{ post.upvotes.count }})</button>
  </form>
</div>
{% empty %}<p>No posts yet.</p>{% endfor %}
</body></html>
