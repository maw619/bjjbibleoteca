{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
<div class="auth-wrap">
  <div class="panel auth-card">
    <h2 style="text-align:center">Login</h2>
    <form method="POST">
      {% csrf_token %}
      <div class="form-row"><label for="id_username">Username</label>{{ form.username }}</div>
      <div class="form-row"><label for="id_password">Password</label>{{ form.password }}</div>
      <button type="submit">Login</button>
    </form>
    <p style="text-align:center;margin-top:12px"><a href="{% url 'register' %}">Create account</a></p>
  </div>
</div>
</body>
</html>
