{% extends "base.html" %}

{% block title %}Login{% endblock %}
{% block nav %}{% endblock %}
{% block mobile_tabs %}{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="panel auth-card">
    <h2 class="text-center">Login</h2>
    <form method="POST">
      {% csrf_token %}
      <div class="form-row"><label for="id_username">Username</label>{{ form.username }}</div>
      <div class="form-row"><label for="id_password">Password</label>{{ form.password }}</div>
      <button type="submit">Login</button>
    </form>
    <p class="text-center auth-link"><a href="{% url 'register' %}">Create account</a></p>
  </div>
</div>
{% endblock %}
