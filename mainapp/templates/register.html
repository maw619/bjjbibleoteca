{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
<div class="auth-wrap">
  <div class="panel auth-card">
    <h2 style="text-align:center">Create Account</h2>
    <form method="POST">
      {% csrf_token %}
      <div class="form-row"><label for="id_username">Username</label>{{ form.username }}</div>
      <div class="form-row"><label for="id_email">Email</label>{{ form.email }}</div>
      <div class="form-row"><label for="id_password1">Password</label>{{ form.password1 }}</div>
      <div class="form-row"><label for="id_password2">Confirm password</label>{{ form.password2 }}</div>
      <button type="submit">Register</button>
      {% if form.errors %}
      <div class="error-box">
        {% for field in form %}{% for error in field.errors %}<p>{{ error }}</p>{% endfor %}{% endfor %}
      </div>
      {% endif %}
    </form>
    <p style="text-align:center;margin-top:12px"><a href="{% url 'login' %}">Already have an account?</a></p>
  </div>
</div>
</body>
</html>
