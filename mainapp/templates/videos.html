{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BJJ Training Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
  <style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

/* Center everything */
.container {
  padding: 15px;
}

/* Cards */
.card {
  background: #020617;
  border-radius: 16px;
  padding: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* Titles */
.category-title {
  font-size: 16px;
  font-weight: 600;
  color: #e2e8f0;
}

/* Dropdown */
select.form-select {
  background: #1e293b;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 16px;
}

/* Video */
video {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

/* Mobile tweaks */
@media (max-width: 768px) {
  .card {
    padding: 12px;
  }

  .category-title {
    font-size: 15px;
  }

  select.form-select {
    font-size: 15px;
    padding: 14px;
  }
}
  </style>
</head>

<body>

<div class="container d-flex justify-content-center">
  <div class="w-100" style="max-width: 600px;">

    {% for category in categories %}
    <div class="card p-3 mb-4">

      <div class="category-title text-center mb-2">
        {{ category.name }}
      </div>

      <select class="form-select mb-3" onchange="playVideo(this)">
        <option disabled selected>Select a section</option>

        {% for section in category.sections.all %}
        <optgroup label="{{ section.name }}">
          {% for video in section.videos.all %}
          <option value="{{ video.url }}">
            {{ video.title }}
          </option>
          {% endfor %}
        </optgroup>
        {% endfor %}
      </select>

      <div class="video-container">
        <video controls playsinline></video>
      </div>

    </div>
    {% endfor %}

  </div>
</div>

<script>
function playVideo(select) {
  const videoUrl = select.value;

  const card = select.closest(".card");
  const videoContainer = card.querySelector(".video-container");
  const video = card.querySelector("video");

  video.src = videoUrl;
  videoContainer.style.display = "block";
  video.play();
}
</script>

</body>
</html>
