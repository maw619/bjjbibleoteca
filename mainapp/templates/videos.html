{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJJ Training Library</title>

<link rel="icon" href="{% static 'favicon.ico' %}">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  display: flex;
  justify-content: center;
  padding: 15px;
}

.wrapper {
  width: 100%;
  max-width: 600px;
}

/* Card */
.card {
  background: #020617;
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* Title */
.category-title {
  text-align: center;
  font-weight: 600;
  margin-bottom: 10px;
}

/* Dropdown */
select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  margin-bottom: 10px;
}

/* Video */
video {
  width: 100%;
  border-radius: 12px;
}

/* Notes */
.noteBox {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  resize: vertical;
}

/* Button */
button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

/* Top bar */
.topbar {
  text-align: right;
  padding: 10px;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  color: white;
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.3s ease, bottom 0.3s ease;
  z-index: 9999;
}

.toast.show {
  opacity: 1;
  bottom: 40px;
}

.toast.error {
  background: #ef4444;
}
.note-container {
  position: relative;
  margin-top: 10px;
}

.note-icon {
  position: absolute;
  left: 12px;
  top: 12px;
  font-size: 16px;
  color: #60a5fa;
  pointer-events: none; /* click passes through */
}

.noteBox {
  width: 100%;
  padding: 12px 12px 12px 38px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  resize: vertical;

  box-sizing: border-box; /* 🔥 FIX */
}
</style>
</head>

<body>
<div id="toast" class="toast"></div>
<div class="topbar">
  {% if user.is_authenticated %}
    Welcome, {{ user.username }} |
    <a href="{% url 'notes' %}" style="color:#60a5fa; margin-right:10px;">Notes</a>
    <a href="{% url 'logout' %}" style="color:#60a5fa;">Logout</a>
  {% else %}
    <a href="{% url 'login' %}" style="color:#60a5fa;">Login</a> |
    <a href="{% url 'register' %}" style="color:#60a5fa;">Register</a>
  {% endif %}
</div>

<div class="container">
  <div class="wrapper">

    {% for category in categories %}
    <div class="card"> 

      <div class="category-title">
        {{ category.name }}
      </div>

      <!-- DROPDOWN -->
      <select onchange="playVideo(this)">
        <option disabled selected>Select a video</option>

        {% for section in category.sections.all %}
        <optgroup label="{{ section.name }}">
          {% for video in section.videos.all %}
          <option value="{{ video.url }}" data-id="{{ video.id }}">
            {{ video.title }}
          </option>
          {% endfor %}
        </optgroup>
        {% endfor %}
      </select>

      <!-- VIDEO -->
      <video controls playsinline></video>

      <!-- NOTES -->
      <div class="note-container">
  <span class="note-icon">✍️</span>
  <textarea class="noteBox" placeholder="Write notes..."></textarea>
</div>

      <button onclick="saveNote(this)">Save Notes</button>

    </div>
    {% endfor %}

  </div>
</div>

<script>
function playVideo(select) {
  const selected = select.options[select.selectedIndex];

  const videoUrl = selected.value;
  const videoId = selected.getAttribute("data-id");

  const card = select.closest(".card");
  const video = card.querySelector("video");
  const textarea = card.querySelector(".noteBox");

  video.src = videoUrl;
  video.play();

  // store video ID
  card.dataset.videoId = videoId;

  // 🔥 LOAD SAVED NOTE
  fetch(`/get-note/${videoId}/`)
    .then(res => res.json())
    .then(data => {
      if (Array.isArray(data.notes) && data.notes.length > 0) {
        textarea.value = data.notes
          .map(note => `[${formatTime(note.timestamp || 0)}] ${note.content}`)
          .join("\n\n");
      } else {
        textarea.value = "";
      }
    });
}

function saveNote(button) {
  const card = button.closest(".card");
  const video = card.querySelector("video");

  const textarea = card.querySelector(".noteBox");
  const content = textarea.value;
  const videoId = card.dataset.videoId;

  if (!videoId) {
    showToast("Please select a video first", true);
    return;
  }

  const timestamp = video.currentTime;

  fetch("/save-note/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": getCookie("csrftoken")
    },
    body: JSON.stringify({
      video_id: videoId,
      content: content,
      timestamp: timestamp
    })
  })
  .then(res => res.json())
  .then(data => {
    const videoTitle = card.querySelector(".title")?.innerText || "Video";

    const formattedTime = formatTime(timestamp);

    showToast(`Saved at ${formattedTime} — ${videoTitle}`);
  })
  .catch(() => {
    showToast("Error saving note", true);
  });
  navigator.vibrate(50);
}
// CSRF helper
function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let cookie of cookies) {
      cookie = cookie.trim();
      if (cookie.startsWith(name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
      }
    }
  }
  return cookieValue;
}


function formatTime(seconds) {
  seconds = Math.floor(seconds);
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;

  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function showToast(message) {
  const toast = document.getElementById("toast");

  toast.innerText = message;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2500);
}
</script>




</body>
</html>
